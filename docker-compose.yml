services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5
 
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      AWS_REGION: us-east-1
      S3_BUCKET: victormadrid-objects
    depends_on:
      redis:
        condition: service_healthy
 
  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
      AWS_REGION: us-east-1
      S3_BUCKET: victormadrid-objects
    deploy:
      replicas: 3
    depends_on:
      redis:
        condition: service_healthy
 

